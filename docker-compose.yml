services:
  postgres:
    image: postgres:16-alpine
    container_name: fgoi-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: fgoi
      POSTGRES_PASSWORD: fgoi
      POSTGRES_DB: fantasticghosts
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
